services:
  c1:
    build: .
    ports:
      - 8080:8080
    expose:
      - 8080
    volumes:
      - .:/staging
      - ./log/c1/:/log
    command:
      - bash
      - -c
      - |
        cp -r /staging /app
        cd /app
        rm -f *.sqlite*
        python3 config --port 8080 --host 0.0.0.0 --secret-text password --agtuuid c1 --log-path /log
        python3 server &
        SERVER_PID=$!
        sleep 4

        python3 agnet set http://c2:8080/mpi

        wait $SERVER_PID

  c2:
